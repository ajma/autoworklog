<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Work Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=chevron_left,chevron_right,content_copy,delete,description,download,login,logout,save,schedule,timer&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header class="top-bar">
      <span class="material-symbols-outlined top-bar-icon">description</span>
      <h1 class="title-large">Auto Work Log</h1>
    </header>

    <!-- Log card with day navigation -->
    <section class="card">
      <div class="day-nav">
        <button id="prev-day-btn" class="btn-icon" title="Previous day">
          <span class="material-symbols-outlined">chevron_left</span>
        </button>
        <span id="log-date" class="title-small"></span>
        <button id="next-day-btn" class="btn-icon" title="Next day">
          <span class="material-symbols-outlined">chevron_right</span>
        </button>
      </div>
      <div id="log-list"></div>
      <div id="log-summary" class="label-medium summary"></div>
    </section>

    <!-- Actions card -->
    <section class="card">
      <div class="card-actions">
        <button id="export-btn" class="btn btn-filled">
          <span class="material-symbols-outlined">download</span>
          Export to Sheet
        </button>
        <button id="clear-btn" class="btn btn-outlined btn-error">
          <span class="material-symbols-outlined">delete</span>
          Clear Log
        </button>
      </div>
      <div id="export-status" class="status-msg"></div>
    </section>

    <!-- Settings card -->
    <section class="card">
      <h2 class="title-small">Settings</h2>
      <div class="text-field">
        <input type="text" id="target-doc-url" placeholder=" " autocomplete="off">
        <label for="target-doc-url">Google Sheet URL</label>
      </div>

      <div class="text-field">
        <input type="number" id="retention-days" placeholder=" " min="1" max="90" autocomplete="off">
        <label for="retention-days">History retention (days)</label>
      </div>
      <div class="card-actions">
        <button id="save-settings" class="btn btn-tonal">
          <span class="material-symbols-outlined">save</span>
          Save
        </button>
        <button id="sign-in-btn" class="btn btn-outlined">
          <span class="material-symbols-outlined">login</span>
          Sign in with Google
        </button>
      </div>
      <div id="settings-status" class="status-msg"></div>
      <div id="auth-status" class="status-msg"></div>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
