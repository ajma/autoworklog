<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Work Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=chevron_left,chevron_right,close,content_copy,delete,description,download,login,logout,pause,play_arrow,save,schedule,settings,timer,visibility&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header class="top-bar">
      <span class="material-symbols-outlined top-bar-icon">description</span>
      <h1 class="title-large">Auto Work Log</h1>
      <div class="day-nav">
        <button id="prev-day-btn" class="btn-icon" title="Previous day">
          <span class="material-symbols-outlined">chevron_left</span>
        </button>
        <span id="log-date" class="label-medium"></span>
        <button id="next-day-btn" class="btn-icon" title="Next day">
          <span class="material-symbols-outlined">chevron_right</span>
        </button>
      </div>
      <button id="pause-toggle" class="btn-icon" title="Pause tracking">
        <span class="material-symbols-outlined">pause</span>
      </button>
      <button id="settings-toggle" class="btn-icon" title="Settings">
        <span class="material-symbols-outlined">settings</span>
      </button>
    </header>

    <div class="filter-wrap">
      <input type="text" id="filter-input" class="filter-input" placeholder="Filter..." autocomplete="off">
      <button id="filter-clear" class="filter-clear" type="button" aria-label="Clear filter">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <!-- Log card -->
    <section class="card">
      <div id="log-list"></div>
      <div id="log-summary" class="label-medium summary"></div>
    </section>

    <!-- Actions card -->
    <section class="card">
      <div class="card-actions">
        <button id="export-btn" class="btn btn-filled" style="visibility: hidden">
        </button>
        <button id="clear-btn" class="btn btn-outlined btn-error">
          <span class="material-symbols-outlined">delete</span>
          Clear Log
        </button>
      </div>
      <div id="export-status" class="status-msg"></div>
    </section>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
