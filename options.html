<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Work Log — Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=add,delete,download,login,logout,save,undo,upload&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="options-page">
  <div class="container">
    <h1 class="title-large" style="padding: 8px 0 4px">Auto Work Log Settings</h1>

    <!-- General settings -->
    <section class="card">
      <h2 class="title-small">General</h2>
      <div class="text-field">
        <input type="text" id="target-doc-url" placeholder=" " autocomplete="off">
        <label for="target-doc-url">Google Sheet URL</label>
      </div>
      <div class="field-row">
        <div class="text-field">
          <input type="number" id="retention-days" placeholder=" " min="1" max="90" autocomplete="off">
          <label for="retention-days">History retention (days)</label>
        </div>
        <div class="text-field">
          <input type="number" id="min-visit-seconds" placeholder=" " min="0" max="3600" autocomplete="off">
          <label for="min-visit-seconds">Minimum visit duration (seconds)</label>
        </div>
      </div>
      <div class="card-actions">
        <button id="sign-in-btn" class="btn btn-outlined">
          <span class="material-symbols-outlined">login</span>
          Sign in with Google
        </button>
      </div>
      <div id="auth-status" class="status-msg"></div>
    </section>

    <!-- URL rules -->
    <section class="card">
      <h2 class="title-small">URL Rules</h2>
      <p class="label-medium" style="color: var(--md-on-surface-variant)">
        URLs are matched top-to-bottom. The first capture group <code>(…)</code> in each pattern is used as the document ID.
      </p>
      <div id="rules-list"></div>
      <div class="card-actions">
        <button id="add-rule-btn" class="btn btn-tonal">
          <span class="material-symbols-outlined">add</span>
          Add Rule
        </button>
        <button id="reset-rules-btn" class="btn btn-outlined">
          <span class="material-symbols-outlined">undo</span>
          Reset to Defaults
        </button>
      </div>
    </section>

    <!-- Import / Export -->
    <section class="card">
      <h2 class="title-small">Import / Export</h2>
      <div class="card-actions">
        <button id="export-settings-btn" class="btn btn-outlined">
          <span class="material-symbols-outlined">download</span>
          Export Settings
        </button>
        <button id="import-settings-btn" class="btn btn-outlined">
          <span class="material-symbols-outlined">upload</span>
          Import Settings
        </button>
        <input type="file" id="import-file" accept=".json" hidden>
      </div>
      <div id="import-export-status" class="status-msg"></div>
    </section>

    <!-- Save -->
    <div class="card-actions">
      <button id="save-btn" class="btn btn-filled">
        <span class="material-symbols-outlined">save</span>
        Save
      </button>
    </div>
    <div id="save-status" class="status-msg"></div>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
